version: 2

models:
  - name: silver_emr_patient
    description: "Deduplicated and typed EMR patient records"
    config:
      contract:
        enforced: true
    columns:
      - name: emr_patient_id
        data_type: varchar
        constraints:
          - type: primary_key
        tests:
          - unique
          - not_null
      - name: mrn
        data_type: varchar
        tests:
          - not_null
      - name: first_name
        data_type: varchar
        tests:
          - not_null
      - name: last_name
        data_type: varchar
        tests:
          - not_null
      - name: dob
        data_type: date
        tests:
          - not_null
      - name: sex
        data_type: varchar
        tests:
          - accepted_values:
              values: ['M', 'F', 'O', 'U']
      - name: phone
        data_type: varchar
        tests:
          - dbt_expectations.expect_column_values_to_match_regex:
              regex: '^[0-9]{10,11}$'
              severity: warn
      - name: email
        data_type: varchar
      - name: address_line1
        data_type: varchar
      - name: city
        data_type: varchar
      - name: state
        data_type: varchar
        tests:
          - dbt_expectations.expect_column_value_lengths_to_equal:
              value: 2
      - name: zip
        data_type: varchar
        tests:
          - dbt_expectations.expect_column_values_to_match_regex:
              regex: '^[0-9]{5}$'
      - name: ssn_last4
        data_type: varchar
      - name: deceased_flag
        data_type: boolean
      - name: last_updated_at
        data_type: timestamp
      - name: _ingested_at
        data_type: timestamp
        tests:
          - not_null
      - name: _source_system
        data_type: varchar
        tests:
          - not_null
      - name: _source_file
        data_type: varchar
      - name: _row_hash
        data_type: varchar
        tests:
          - not_null
      - name: _silver_loaded_at
        data_type: timestamptz

  - name: silver_emr_encounter
    description: "Deduplicated and typed EMR encounter records"
    config:
      contract:
        enforced: true
    columns:
      - name: emr_encounter_id
        data_type: varchar
        constraints:
          - type: primary_key
        tests:
          - unique
          - not_null
      - name: emr_patient_id
        data_type: varchar
        constraints:
          - type: foreign_key
            to: ref('silver_emr_patient')
            to_columns: [emr_patient_id]
        tests:
          - not_null
          - relationships:
              to: ref('silver_emr_patient')
              field: emr_patient_id
      - name: encounter_type
        data_type: varchar
        tests:
          - accepted_values:
              values: ['outpatient', 'inpatient', 'ed']
      - name: status
        data_type: varchar
        tests:
          - accepted_values:
              values: ['planned', 'in-progress', 'completed', 'cancelled']
      - name: start_time
        data_type: timestamp
        tests:
          - not_null
      - name: end_time
        data_type: timestamp
      - name: facility_id
        data_type: varchar
      - name: attending_provider_id
        data_type: varchar
      - name: chief_complaint
        data_type: varchar
      - name: _ingested_at
        data_type: timestamp
        tests:
          - not_null
      - name: _source_system
        data_type: varchar
        tests:
          - not_null
      - name: _source_file
        data_type: varchar
      - name: _row_hash
        data_type: varchar
        tests:
          - not_null
      - name: _silver_loaded_at
        data_type: timestamptz

  - name: silver_emr_diagnosis
    description: "Deduplicated and typed EMR diagnosis records"
    config:
      contract:
        enforced: true
    constraints:
      - type: primary_key
        columns: [emr_encounter_id, icd10_code]
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - emr_encounter_id
            - icd10_code
    columns:
      - name: emr_encounter_id
        data_type: varchar
        constraints:
          - type: foreign_key
            to: ref('silver_emr_encounter')
            to_columns: [emr_encounter_id]
        tests:
          - not_null
          - relationships:
              to: ref('silver_emr_encounter')
              field: emr_encounter_id
      - name: icd10_code
        data_type: varchar
        tests:
          - not_null
      - name: diagnosis_desc
        data_type: varchar
      - name: diagnosis_rank
        data_type: integer
      - name: _ingested_at
        data_type: timestamp
        tests:
          - not_null
      - name: _source_system
        data_type: varchar
        tests:
          - not_null
      - name: _source_file
        data_type: varchar
      - name: _row_hash
        data_type: varchar
        tests:
          - not_null
      - name: _silver_loaded_at
        data_type: timestamptz

  - name: silver_emr_procedure
    description: "Deduplicated and typed EMR procedure records"
    config:
      contract:
        enforced: true
    constraints:
      - type: primary_key
        columns: [emr_encounter_id, cpt_code]
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - emr_encounter_id
            - cpt_code
    columns:
      - name: emr_encounter_id
        data_type: varchar
        constraints:
          - type: foreign_key
            to: ref('silver_emr_encounter')
            to_columns: [emr_encounter_id]
        tests:
          - not_null
          - relationships:
              to: ref('silver_emr_encounter')
              field: emr_encounter_id
      - name: cpt_code
        data_type: varchar
        tests:
          - not_null
      - name: procedure_desc
        data_type: varchar
      - name: performed_time
        data_type: timestamp
      - name: _ingested_at
        data_type: timestamp
        tests:
          - not_null
      - name: _source_system
        data_type: varchar
        tests:
          - not_null
      - name: _source_file
        data_type: varchar
      - name: _row_hash
        data_type: varchar
        tests:
          - not_null
      - name: _silver_loaded_at
        data_type: timestamptz

  - name: silver_emr_provider
    description: "Deduplicated and typed EMR provider records"
    config:
      contract:
        enforced: true
    columns:
      - name: emr_provider_id
        data_type: varchar
        constraints:
          - type: primary_key
        tests:
          - unique
          - not_null
      - name: npi
        data_type: varchar
        tests:
          - dbt_expectations.expect_column_values_to_match_regex:
              regex: '^[0-9]{10}$'
              row_condition: "npi is not null"
      - name: first_name
        data_type: varchar
      - name: last_name
        data_type: varchar
      - name: specialty
        data_type: varchar
      - name: org_name
        data_type: varchar
      - name: phone
        data_type: varchar
      - name: address_line1
        data_type: varchar
      - name: city
        data_type: varchar
      - name: state
        data_type: varchar
      - name: zip
        data_type: varchar
      - name: _ingested_at
        data_type: timestamp
        tests:
          - not_null
      - name: _source_system
        data_type: varchar
        tests:
          - not_null
      - name: _source_file
        data_type: varchar
      - name: _row_hash
        data_type: varchar
        tests:
          - not_null
      - name: _silver_loaded_at
        data_type: timestamptz

  - name: silver_rcm_patient_account
    description: "Deduplicated and typed RCM patient account records"
    config:
      contract:
        enforced: true
    columns:
      - name: rcm_account_id
        data_type: varchar
        constraints:
          - type: primary_key
        tests:
          - unique
          - not_null
      # emr_patient_id intentionally ~30% NULL — FK allows NULL by SQL standard (NULL skips FK check)
      - name: emr_patient_id
        data_type: varchar
        constraints:
          - type: foreign_key
            to: ref('silver_emr_patient')
            to_columns: [emr_patient_id]
      - name: patient_external_id
        data_type: varchar
        tests:
          - not_null
      - name: guarantor_name
        data_type: varchar
      - name: patient_first_name
        data_type: varchar
      - name: patient_last_name
        data_type: varchar
      - name: dob
        data_type: date
      - name: phone
        data_type: varchar
      - name: address_line1
        data_type: varchar
      - name: city
        data_type: varchar
      - name: state
        data_type: varchar
      - name: zip
        data_type: varchar
      - name: _ingested_at
        data_type: timestamp
        tests:
          - not_null
      - name: _source_system
        data_type: varchar
        tests:
          - not_null
      - name: _source_file
        data_type: varchar
      - name: _row_hash
        data_type: varchar
        tests:
          - not_null
      - name: _silver_loaded_at
        data_type: timestamptz

  - name: silver_rcm_claim_header
    description: "Deduplicated and typed RCM claim header records"
    config:
      contract:
        enforced: true
    columns:
      - name: claim_id
        data_type: varchar
        constraints:
          - type: primary_key
        tests:
          - unique
          - not_null
      - name: rcm_account_id
        data_type: varchar
        constraints:
          - type: foreign_key
            to: ref('silver_rcm_patient_account')
            to_columns: [rcm_account_id]
        tests:
          - not_null
          - relationships:
              to: ref('silver_rcm_patient_account')
              field: rcm_account_id
      - name: facility_id
        data_type: varchar
      - name: billing_provider_npi
        data_type: varchar
      - name: rendering_provider_npi
        data_type: varchar
      - name: payer_id
        data_type: varchar
      - name: payer_name
        data_type: varchar
      - name: claim_type
        data_type: varchar
        tests:
          - accepted_values:
              values: ['institutional', 'professional']
      - name: total_charge_amount
        data_type: decimal(12,2)
        tests:
          - not_null
      - name: claim_status
        data_type: varchar
        tests:
          - accepted_values:
              values: ['submitted', 'accepted', 'denied', 'paid', 'void']
      - name: submitted_date
        data_type: date
      - name: service_from_date
        data_type: date
      - name: service_to_date
        data_type: date
      - name: _ingested_at
        data_type: timestamp
        tests:
          - not_null
      - name: _source_system
        data_type: varchar
        tests:
          - not_null
      - name: _source_file
        data_type: varchar
      - name: _row_hash
        data_type: varchar
        tests:
          - not_null
      - name: _silver_loaded_at
        data_type: timestamptz

  - name: silver_rcm_claim_line
    description: "Deduplicated and typed RCM claim line records"
    config:
      contract:
        enforced: true
    constraints:
      - type: primary_key
        columns: [claim_id, line_num]
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - claim_id
            - line_num
    columns:
      - name: claim_id
        data_type: varchar
        constraints:
          - type: foreign_key
            to: ref('silver_rcm_claim_header')
            to_columns: [claim_id]
        tests:
          - not_null
          - relationships:
              to: ref('silver_rcm_claim_header')
              field: claim_id
      - name: line_num
        data_type: integer
        tests:
          - not_null
      - name: cpt_code
        data_type: varchar
        tests:
          - not_null
      - name: units
        data_type: decimal(10,2)
      - name: charge_amount
        data_type: decimal(12,2)
        tests:
          - not_null
      - name: allowed_amount
        data_type: decimal(12,2)
      - name: paid_amount
        data_type: decimal(12,2)
      - name: denial_code
        data_type: varchar
      - name: _ingested_at
        data_type: timestamp
        tests:
          - not_null
      - name: _source_system
        data_type: varchar
        tests:
          - not_null
      - name: _source_file
        data_type: varchar
      - name: _row_hash
        data_type: varchar
        tests:
          - not_null
      - name: _silver_loaded_at
        data_type: timestamptz

  - name: silver_rcm_remittance_835
    description: "Deduplicated and typed RCM remittance 835 records"
    config:
      contract:
        enforced: true
    columns:
      - name: remit_id
        data_type: varchar
        constraints:
          - type: primary_key
        tests:
          - unique
          - not_null
      - name: payer_id
        data_type: varchar
        tests:
          - not_null
      - name: payment_date
        data_type: date
        tests:
          - not_null
      - name: trace_number
        data_type: varchar
      - name: total_payment_amount
        data_type: decimal(12,2)
        tests:
          - not_null
      - name: raw_835_document_ref
        data_type: varchar
      - name: _ingested_at
        data_type: timestamp
        tests:
          - not_null
      - name: _source_system
        data_type: varchar
        tests:
          - not_null
      - name: _source_file
        data_type: varchar
      - name: _row_hash
        data_type: varchar
        tests:
          - not_null
      - name: _silver_loaded_at
        data_type: timestamptz

  - name: silver_rcm_ar_balance_snapshot
    description: "Deduplicated and typed RCM AR balance snapshot records"
    config:
      contract:
        enforced: true
    constraints:
      - type: primary_key
        columns: [snapshot_date, claim_id]
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - snapshot_date
            - claim_id
    columns:
      - name: snapshot_date
        data_type: date
        tests:
          - not_null
      - name: claim_id
        data_type: varchar
        constraints:
          - type: foreign_key
            to: ref('silver_rcm_claim_header')
            to_columns: [claim_id]
        tests:
          - not_null
          - relationships:
              to: ref('silver_rcm_claim_header')
              field: claim_id
      - name: rcm_account_id
        data_type: varchar
        tests:
          - not_null
      - name: payer_responsibility_balance
        data_type: decimal(12,2)
      - name: patient_responsibility_balance
        data_type: decimal(12,2)
      - name: aging_bucket
        data_type: varchar
        tests:
          - accepted_values:
              values: ['0-30', '31-60', '61-90', '90+']
      - name: _ingested_at
        data_type: timestamp
        tests:
          - not_null
      - name: _source_system
        data_type: varchar
        tests:
          - not_null
      - name: _source_file
        data_type: varchar
      - name: _row_hash
        data_type: varchar
        tests:
          - not_null
      - name: _silver_loaded_at
        data_type: timestamptz

  - name: silver_referral_order
    description: "Deduplicated and typed referral order records"
    config:
      contract:
        enforced: true
    columns:
      - name: referral_order_id
        data_type: varchar
        constraints:
          - type: primary_key
        tests:
          - unique
          - not_null
      - name: referral_source_system
        data_type: varchar
      - name: referral_created_at
        data_type: timestamp
      - name: patient_first_name
        data_type: varchar
        tests:
          - not_null
      - name: patient_last_name
        data_type: varchar
        tests:
          - not_null
      - name: dob
        data_type: date
        tests:
          - not_null
      - name: phone
        data_type: varchar
      - name: email
        data_type: varchar
      - name: address_line1
        data_type: varchar
      - name: city
        data_type: varchar
      - name: state
        data_type: varchar
      - name: zip
        data_type: varchar
      - name: referring_provider_name
        data_type: varchar
      # referring_provider_npi is intentionally ~20% NULL — no not_null test
      - name: referring_provider_npi
        data_type: varchar
      - name: receiving_facility_id
        data_type: varchar
      - name: primary_diagnosis_icd10
        data_type: varchar
      - name: requested_service_cpt
        data_type: varchar
      - name: priority
        data_type: varchar
        tests:
          - accepted_values:
              values: ['routine', 'urgent']
      - name: order_status
        data_type: varchar
        tests:
          - accepted_values:
              values: ['received', 'scheduled', 'completed', 'cancelled']
      - name: counterparty_org_name
        data_type: varchar
      - name: counterparty_org_type
        data_type: varchar
        tests:
          - accepted_values:
              values: ['law_firm', 'pi_firm', 'clinic', 'employer']
      - name: case_reference_id
        data_type: varchar
      - name: _ingested_at
        data_type: timestamp
        tests:
          - not_null
      - name: _source_system
        data_type: varchar
        tests:
          - not_null
      - name: _source_file
        data_type: varchar
      - name: _row_hash
        data_type: varchar
        tests:
          - not_null
      - name: _silver_loaded_at
        data_type: timestamptz

  - name: silver_referral_order_status_history
    description: "Deduplicated and typed referral order status history records"
    config:
      contract:
        enforced: true
    constraints:
      - type: primary_key
        columns: [referral_order_id, status, status_time]
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - referral_order_id
            - status
            - status_time
    columns:
      - name: referral_order_id
        data_type: varchar
        constraints:
          - type: foreign_key
            to: ref('silver_referral_order')
            to_columns: [referral_order_id]
        tests:
          - not_null
          - relationships:
              to: ref('silver_referral_order')
              field: referral_order_id
      - name: status
        data_type: varchar
        tests:
          - not_null
      - name: status_time
        data_type: timestamp
        tests:
          - not_null
      - name: changed_by
        data_type: varchar
      - name: _ingested_at
        data_type: timestamp
        tests:
          - not_null
      - name: _source_system
        data_type: varchar
        tests:
          - not_null
      - name: _source_file
        data_type: varchar
      - name: _row_hash
        data_type: varchar
        tests:
          - not_null
      - name: _silver_loaded_at
        data_type: timestamptz

  - name: silver_referral_document_reference
    description: "Deduplicated and typed referral document reference records"
    config:
      contract:
        enforced: true
    # doc_type can be NULL (invalid Faker values → NULL via validation); cannot be part of DDL PK
    # DDL PK uses (referral_order_id, doc_uri) — doc_uri is the unique document identifier
    constraints:
      - type: primary_key
        columns: [referral_order_id, doc_uri]
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - referral_order_id
            - doc_type
            - doc_uri
    columns:
      - name: referral_order_id
        data_type: varchar
        constraints:
          - type: foreign_key
            to: ref('silver_referral_order')
            to_columns: [referral_order_id]
        tests:
          - not_null
          - relationships:
              to: ref('silver_referral_order')
              field: referral_order_id
      - name: doc_type
        data_type: varchar
        tests:
          - not_null
          - accepted_values:
              values: ['referral_form', 'imaging', 'insurance_card']
      - name: doc_uri
        data_type: varchar
        tests:
          - not_null
      - name: uploaded_at
        data_type: timestamp
      - name: _ingested_at
        data_type: timestamp
        tests:
          - not_null
      - name: _source_system
        data_type: varchar
        tests:
          - not_null
      - name: _source_file
        data_type: varchar
      - name: _row_hash
        data_type: varchar
        tests:
          - not_null
      - name: _silver_loaded_at
        data_type: timestamptz
